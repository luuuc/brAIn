version: 2

builds:
  - id: brain
    main: ./cmd/brain
    binary: brain
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/luuuc/brain/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: brain
    ids: [brain]
    formats: [tar.gz]
    name_template: "brain_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "brain_{{ .Version }}_checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"

release:
  github:
    owner: luuuc
    name: brain
  prerelease: auto
  make_latest: true
